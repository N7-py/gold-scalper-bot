<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Scalper Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c10;
            --accent-gold: #f4d03f;
            --accent-glow: rgba(244, 208, 63, 0.4);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #8b8f9e;
            --success: #00ff88;
            --danger: #ff3366;
            --paper-mode: #00e5ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(244, 208, 63, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 229, 255, 0.05), transparent 25%);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Abstract Background blobs */
        .blob {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            border-radius: 50%;
            animation: float 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }
        .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: rgba(244, 208, 63, 0.03); }
        .blob-2 { bottom: -10%; right: -10%; width: 60vw; height: 60vw; background: rgba(0, 229, 255, 0.02); }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5%, 5%) scale(1.1); }
        }

        header {
            width: 100%;
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(11, 12, 16, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #fff, var(--accent-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            box-shadow: 0 0 8px var(--text-muted);
        }

        .main-container {
            width: 100%;
            max-width: 1200px;
            padding: 3rem 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            z-index: 1;
        }

        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        .card-title {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .card-value {
            font-size: 2.5rem;
            font-weight: 800;
            font-family: 'JetBrains Mono', monospace;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .value-gold { color: var(--accent-gold); text-shadow: 0 0 20px var(--accent-glow); }
        .value-cyan { color: var(--paper-mode); }

        .terminal-container {
            grid-column: 1 / -1;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 1.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: var(--success);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            position: relative;
        }

        .terminal-header {
            display: flex;
            gap: 8px;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .mac-btn { width: 12px; height: 12px; border-radius: 50%; }
        .mac-close { background: #ff5f56; }
        .mac-min { background: #ffbd2e; }
        .mac-max { background: #27c93f; }

        .raw-json {
            white-space: pre-wrap;
            word-wrap: break-word;
            opacity: 0.8;
            max-height: 300px;
            overflow-y: auto;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        /* Animations */
        @keyframes pulse-success { 
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.4); } 
            70% { box-shadow: 0 0 0 10px rgba(0, 255, 136, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); } 
        }
        @keyframes pulse-danger { 
            0% { box-shadow: 0 0 0 0 rgba(255, 51, 102, 0.4); } 
            70% { box-shadow: 0 0 0 10px rgba(255, 51, 102, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(255, 51, 102, 0); } 
        }

        .bot-running .dot { background: var(--success); animation: pulse-success 2s infinite; }
        .bot-stopped .dot { background: var(--danger); animation: pulse-danger 2s infinite; }

        .loading {
            position: fixed;
            inset: 0;
            background: var(--bg-color);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="loading" id="loader">
        <div class="spinner"></div>
    </div>

    <header>
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
            GOLD SCALPER
        </div>
        <div class="status-badge" id="status-badge">
            <div class="dot"></div>
            <span id="status-text">Connecting...</span>
        </div>
    </header>

    <div class="main-container">
        
        <div class="glass-card">
            <div class="card-title">Trading Mode</div>
            <div class="card-value value-cyan" id="bot-mode">--</div>
        </div>

        <div class="glass-card">
            <div class="card-title">Live Balance</div>
            <div class="card-value value-gold" id="bot-balance">$--</div>
        </div>

        <div class="glass-card">
            <div class="card-title">Active Target</div>
            <div class="card-value" id="bot-symbol">--</div>
        </div>

        <div class="glass-card">
            <div class="card-title">Open Positions</div>
            <div class="card-value" id="bot-positions">0</div>
        </div>

        <div class="glass-card">
            <div class="card-title">Uptime</div>
            <div class="card-value" id="bot-uptime">0s</div>
        </div>

        <div class="terminal-container">
            <div class="terminal-header">
                <div class="mac-btn mac-close"></div>
                <div class="mac-btn mac-min"></div>
                <div class="mac-btn mac-max"></div>
                <span style="margin-left: 10px; color: var(--text-muted); font-family: 'Outfit'; font-size: 0.8rem;">engine/status.json</span>
            </div>
            <div class="raw-json" id="raw-json">Awaiting telemetry...</div>
        </div>

    </div>

    <script>
        function formatUptime(seconds) {
            if (seconds < 60) return seconds + 's';
            const mins = Math.floor(seconds / 60);
            if (mins < 60) return mins + 'm ' + (seconds % 60) + 's';
            const hours = Math.floor(mins / 60);
            return hours + 'h ' + (mins % 60) + 'm';
        }

        async function fetchStatus() {
            try {
                const response = await fetch('/status');
                const data = await response.json();
                
                // Hide loader
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 500);

                // Update UI Header
                const badge = document.getElementById('status-badge');
                const statusText = document.getElementById('status-text');
                
                if (data.bot.running) {
                    badge.className = 'status-badge bot-running';
                    statusText.textContent = 'Engine Active';
                } else {
                    badge.className = 'status-badge bot-stopped';
                    statusText.textContent = 'Engine Offline';
                }

                // Update Cards
                document.getElementById('bot-mode').textContent = data.bot.mode.toUpperCase();
                document.getElementById('bot-mode').className = data.bot.mode === 'live' ? 'card-value value-gold' : 'card-value value-cyan';
                
                document.getElementById('bot-balance').textContent = '$' + data.bot.balance.toLocaleString('en-US', {minimumFractionDigits: 2});
                document.getElementById('bot-symbol').textContent = data.bot.symbol;
                document.getElementById('bot-positions').textContent = data.bot.positions;
                document.getElementById('bot-uptime').textContent = formatUptime(data.uptime_seconds);

                // Update Terminal
                document.getElementById('raw-json').textContent = JSON.stringify(data, null, 2);

            } catch (error) {
                console.error("Status fetch failed:", error);
                const badge = document.getElementById('status-badge');
                badge.className = 'status-badge bot-stopped';
                document.getElementById('status-text').textContent = 'Connection Lost';
            }
        }

        // Poll every 2 seconds
        setInterval(fetchStatus, 2000);
        fetchStatus();
    </script>
</body>
</html>
