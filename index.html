<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Scalper Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root {
            --bg-color: #0b0c10;
            --accent-gold: #f4d03f;
            --accent-glow: rgba(244, 208, 63, 0.4);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #8b8f9e;
            --success: #00ff88;
            --danger: #ff3366;
            --paper-mode: #00e5ff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 15% 50%, rgba(244, 208, 63, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 229, 255, 0.05), transparent 25%);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .blob { position: absolute; filter: blur(80px); z-index: -1; border-radius: 50%; animation: float 20s infinite alternate cubic-bezier(0.4,0,0.2,1); }
        .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: rgba(244,208,63,0.03); }
        .blob-2 { bottom: -10%; right: -10%; width: 60vw; height: 60vw; background: rgba(0,229,255,0.02); }
        @keyframes float { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(5%,5%) scale(1.1); } }

        header {
            width: 100%;
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(11,12,16,0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #fff, var(--accent-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status-badge {
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); }

        /* ── Chart Section ──────────────────────────────── */
        .chart-section {
            width: 100%;
            max-width: 1200px;
            padding: 2rem 2rem 0;
            z-index: 1;
        }
        .chart-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            overflow: hidden;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .chart-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--glass-border);
        }
        .chart-title {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .chart-price-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent-gold);
            text-shadow: 0 0 20px var(--accent-glow);
        }
        #chart-container { height: 360px; }

        /* ── Main Grid ──────────────────────────────────── */
        .main-container {
            width: 100%;
            max-width: 1200px;
            padding: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            z-index: 1;
        }
        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 1.5rem;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .glass-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.4); border-color: rgba(255,255,255,0.15); }
        .glass-card::before { content: ''; position: absolute; top:0;left:0;right:0;height:1px; background: linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent); }

        .card-title { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }
        .card-value { font-size: 2rem; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
        .value-gold { color: var(--accent-gold); text-shadow: 0 0 20px var(--accent-glow); }
        .value-cyan { color: var(--paper-mode); }

        /* Mode toggle */
        .mode-toggle { display:flex; gap:4px; background:rgba(255,255,255,0.05); border-radius:8px; padding:3px; }
        .mode-btn { flex:1; padding:5px 10px; border:none; border-radius:6px; font-size:0.7rem; font-weight:700; letter-spacing:0.05em; cursor:pointer; background:transparent; color:var(--text-muted); transition:all 0.2s; }
        .mode-btn.active { background:rgba(255,255,255,0.1); color:var(--text-main); }
        #btn-live.active { color: var(--accent-gold); }
        #btn-paper.active { color: var(--paper-mode); }

        /* ── Conditions Panel ───────────────────────────── */
        .conditions-wrapper {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        @media (max-width: 800px) { .conditions-wrapper { grid-template-columns: 1fr; } }

        .conditions-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 1.5rem;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }
        .conditions-card.active-long  { border-color: rgba(0,255,136,0.35); box-shadow: 0 8px 32px rgba(0,255,136,0.08); }
        .conditions-card.active-short { border-color: rgba(255,51,102,0.35); box-shadow: 0 8px 32px rgba(255,51,102,0.08); }
        .conditions-card::before { content:''; position:absolute; top:0;left:0;right:0;height:2px; }
        .conditions-card.long-card::before  { background: linear-gradient(90deg,transparent,rgba(0,255,136,0.6),transparent); }
        .conditions-card.short-card::before { background: linear-gradient(90deg,transparent,rgba(255,51,102,0.6),transparent); }

        .conditions-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
            gap: 0.75rem;
        }
        .conditions-title-row { display: flex; align-items: center; gap: 10px; }
        .conditions-title { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; }
        .conditions-title.long-title  { color: var(--success); }
        .conditions-title.short-title { color: var(--danger); }

        .bias-pill {
            font-size: 0.7rem; font-weight: 800; letter-spacing: 0.1em;
            padding: 3px 10px; border-radius: 50px; text-transform: uppercase;
        }
        .bias-long    { background: rgba(0,255,136,0.12); color: var(--success); border: 1px solid rgba(0,255,136,0.25); }
        .bias-short   { background: rgba(255,51,102,0.12); color: var(--danger);  border: 1px solid rgba(255,51,102,0.25); }
        .bias-neutral { background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid var(--glass-border); }

        .signal-badge {
            padding: 0.35rem 1rem; border-radius: 50px;
            font-size: 0.75rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
        }
        .signal-ready   { background: rgba(0,255,136,0.12); color: var(--success); border: 1px solid rgba(0,255,136,0.3); }
        .signal-pending { background: rgba(255,51,102,0.1);  color: var(--danger);  border: 1px solid rgba(255,51,102,0.2); }
        .signal-loading { background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid var(--glass-border); }

        .conditions-grid { display: flex; flex-direction: column; gap: 0.5rem; }

        .cond-row {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 0.65rem 0.9rem;
            border-radius: 10px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.04);
        }
        .cond-row.pass { border-left: 3px solid rgba(0,255,136,0.5); }
        .cond-row.fail { border-left: 3px solid rgba(255,51,102,0.5); }
        .cond-row.info { border-left: 3px solid rgba(244,208,63,0.4); }
        .cond-icon { font-size: 0.9rem; flex-shrink: 0; margin-top: 2px; }
        .cond-body { flex: 1; min-width: 0; }
        .cond-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 2px; }
        .cond-value { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; font-weight: 700; word-break: break-all; }
        .cond-value.pass { color: var(--success); }
        .cond-value.fail { color: var(--danger); }
        .cond-value.info { color: var(--accent-gold); }
        .cond-required { font-size: 0.65rem; color: var(--text-muted); margin-top: 2px; opacity: 0.65; }

        .section-divider {
            display: flex; align-items: center; gap: 8px;
            margin: 0.75rem 0 0.5rem;
            font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em;
            text-transform: uppercase; color: var(--text-muted); opacity: 0.6;
        }
        .section-divider::before, .section-divider::after {
            content: ''; flex: 1; height: 1px; background: var(--glass-border);
        }

        /* ── Terminal ───────────────────────────────────── */
        .terminal-container {
            grid-column: 1 / -1;
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 1.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--success);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
        .terminal-header { display:flex; gap:8px; margin-bottom:1rem; padding-bottom:1rem; border-bottom:1px solid var(--glass-border); align-items:center; }
        .mac-btn { width:12px; height:12px; border-radius:50%; }
        .mac-close { background:#ff5f56; } .mac-min { background:#ffbd2e; } .mac-max { background:#27c93f; }
        .raw-json { white-space:pre-wrap; word-wrap:break-word; opacity:0.8; max-height:260px; overflow-y:auto; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius:4px; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius:4px; }

        /* Animations */
        @keyframes pulse-success { 0%{box-shadow:0 0 0 0 rgba(0,255,136,0.4)} 70%{box-shadow:0 0 0 10px rgba(0,255,136,0)} 100%{box-shadow:0 0 0 0 rgba(0,255,136,0)} }
        @keyframes pulse-danger  { 0%{box-shadow:0 0 0 0 rgba(255,51,102,0.4)} 70%{box-shadow:0 0 0 10px rgba(255,51,102,0)} 100%{box-shadow:0 0 0 0 rgba(255,51,102,0)} }
        .bot-running .dot { background:var(--success); animation:pulse-success 2s infinite; box-shadow:0 0 8px var(--success); }
        .bot-stopped .dot { background:var(--danger);  animation:pulse-danger  2s infinite; box-shadow:0 0 8px var(--danger); }

        .loading { position:fixed; inset:0; background:var(--bg-color); z-index:1000; display:flex; justify-content:center; align-items:center; transition:opacity 0.5s ease; }
        .spinner { width:50px; height:50px; border:3px solid rgba(255,255,255,0.1); border-top-color:var(--accent-gold); border-radius:50%; animation:spin 1s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="loading" id="loader"><div class="spinner"></div></div>

    <header>
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
            GOLD SCALPER
        </div>
        <div class="status-badge" id="status-badge">
            <div class="dot"></div>
            <span id="status-text">Connecting...</span>
        </div>
    </header>

    <!-- Live Chart -->
    <div class="chart-section">
        <div class="chart-card">
            <div class="chart-toolbar">
                <div class="chart-title">
                    XAU / USDT &nbsp;·&nbsp; 5M
                    <span class="bias-pill bias-neutral" id="bias-badge">NEUTRAL</span>
                </div>
                <div class="chart-price-display" id="chart-price">--</div>
            </div>
            <div id="chart-container"></div>
        </div>
    </div>

    <!-- Stats + Conditions + Terminal -->
    <div class="main-container">

        <div class="glass-card">
            <div class="card-title">Trading Mode</div>
            <div class="card-value value-cyan" id="bot-mode">--</div>
            <div class="mode-toggle">
                <button class="mode-btn active" id="btn-paper" onclick="setMode('paper')">PAPER</button>
                <button class="mode-btn"        id="btn-live"  onclick="setMode('live')">LIVE</button>
            </div>
        </div>

        <div class="glass-card">
            <div class="card-title">Live Balance</div>
            <div class="card-value value-gold" id="bot-balance">$--</div>
        </div>

        <div class="glass-card">
            <div class="card-title">Active Target</div>
            <div class="card-value" id="bot-symbol">--</div>
        </div>

        <div class="glass-card">
            <div class="card-title">Open Positions</div>
            <div class="card-value" id="bot-positions">0</div>
        </div>

        <div class="glass-card">
            <div class="card-title">Uptime</div>
            <div class="card-value" id="bot-uptime">0s</div>
        </div>

        <!-- Strategy Conditions — Long + Short side by side -->
        <div class="conditions-wrapper">

            <!-- LONG SETUP -->
            <div class="conditions-card long-card" id="long-card">
                <div class="conditions-header">
                    <div class="conditions-title-row">
                        <div class="conditions-title long-title">▲ Long Setup</div>
                        <span class="bias-pill bias-neutral" id="conditions-bias">NEUTRAL</span>
                    </div>
                    <div class="signal-badge signal-loading" id="long-signal-badge">Scanning...</div>
                </div>
                <div class="conditions-grid" id="long-conditions-list">
                    <!-- populated by JS -->
                </div>
            </div>

            <!-- SHORT SETUP -->
            <div class="conditions-card short-card" id="short-card">
                <div class="conditions-header">
                    <div class="conditions-title-row">
                        <div class="conditions-title short-title">▼ Short Setup</div>
                    </div>
                    <div class="signal-badge signal-loading" id="short-signal-badge">Scanning...</div>
                </div>
                <div class="conditions-grid" id="short-conditions-list">
                    <!-- populated by JS -->
                </div>
            </div>

        </div>

        <!-- Terminal -->
        <div class="terminal-container">
            <div class="terminal-header">
                <div class="mac-btn mac-close"></div>
                <div class="mac-btn mac-min"></div>
                <div class="mac-btn mac-max"></div>
                <span style="margin-left:10px;color:var(--text-muted);font-size:0.8rem;">engine/status.json</span>
            </div>
            <div class="raw-json" id="raw-json">Awaiting telemetry...</div>
        </div>

    </div>

    <script>
    // ── Chart setup ──────────────────────────────────────────
    const chartEl = document.getElementById('chart-container');
    const chart = LightweightCharts.createChart(chartEl, {
        layout: { background: { color: 'transparent' }, textColor: '#8b8f9e' },
        grid: { vertLines: { color: 'rgba(255,255,255,0.04)' }, horzLines: { color: 'rgba(255,255,255,0.04)' } },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
        rightPriceScale: { borderColor: 'rgba(255,255,255,0.08)' },
        timeScale: { borderColor: 'rgba(255,255,255,0.08)', timeVisible: true, secondsVisible: false },
        handleScroll: true,
        handleScale: true,
    });

    const candleSeries = chart.addCandlestickSeries({
        upColor: '#00ff88', downColor: '#ff3366',
        borderUpColor: '#00ff88', borderDownColor: '#ff3366',
        wickUpColor: '#00ff88', wickDownColor: '#ff3366',
    });
    const ema50Series  = chart.addLineSeries({ color: '#00e5ff', lineWidth: 1, title: 'EMA50' });
    const ema200Series = chart.addLineSeries({ color: '#f4d03f', lineWidth: 1, title: 'EMA200' });

    new ResizeObserver(() => chart.applyOptions({ width: chartEl.clientWidth })).observe(chartEl);
    chart.applyOptions({ width: chartEl.clientWidth });

    // ── Candle fetch ─────────────────────────────────────────
    async function fetchCandles() {
        try {
            const res = await fetch('/candles');
            if (!res.ok) return;
            const data = await res.json();
            if (data.candles && data.candles.length) {
                candleSeries.setData(data.candles);
                if (data.ema50.length)  ema50Series.setData(data.ema50);
                if (data.ema200.length) ema200Series.setData(data.ema200);
                const last = data.candles[data.candles.length - 1];
                document.getElementById('chart-price').textContent = '$' + last.close.toLocaleString('en-US', { minimumFractionDigits: 2 });
            }
        } catch (e) { /* silent — bot may not be running */ }
    }

    // ── Conditions fetch ─────────────────────────────────────
    async function fetchConditions() {
        try {
            const res = await fetch('/conditions');
            if (!res.ok) return;
            const data = await res.json();
            renderConditions(data);
        } catch (e) { /* silent */ }
    }

    // IDs of short-specific conditions that get a special "info" style
    const SHORT_INFO_IDS = new Set(['stochrsi']);

    function condRow(c) {
        const isInfo = SHORT_INFO_IDS.has(c.id);
        const rowCls  = isInfo ? 'info' : (c.pass ? 'pass' : 'fail');
        const icon    = isInfo ? '💡' : (c.pass ? '✅' : '❌');
        const valCls  = isInfo ? 'info' : (c.pass ? 'pass' : 'fail');
        return `
            <div class="cond-row ${rowCls}">
                <div class="cond-icon">${icon}</div>
                <div class="cond-body">
                    <div class="cond-label">${c.label}</div>
                    <div class="cond-value ${valCls}">${c.value}</div>
                    <div class="cond-required">Required: ${c.required}</div>
                </div>
            </div>`;
    }

    function renderConditions(data) {
        // Bias badge (chart toolbar + long panel)
        const bias      = data.bias || 'neutral';
        const biasClass = bias === 'long' ? 'bias-long' : bias === 'short' ? 'bias-short' : 'bias-neutral';
        const biasText  = bias.toUpperCase();

        document.getElementById('bias-badge').className    = 'bias-pill ' + biasClass;
        document.getElementById('bias-badge').textContent  = biasText;
        document.getElementById('conditions-bias').className   = 'bias-pill ' + biasClass;
        document.getElementById('conditions-bias').textContent = biasText;

        // Active highlight on the correct card
        const longCard  = document.getElementById('long-card');
        const shortCard = document.getElementById('short-card');
        longCard.classList.toggle('active-long',   bias === 'long');
        shortCard.classList.toggle('active-short',  bias === 'short');

        // Long signal badge
        const longBadge = document.getElementById('long-signal-badge');
        if (data.long_signal_ready) {
            longBadge.className   = 'signal-badge signal-ready';
            longBadge.textContent = 'SIGNAL READY';
        } else {
            longBadge.className   = 'signal-badge signal-pending';
            longBadge.textContent = 'NOT READY';
        }

        // Short signal badge
        const shortBadge = document.getElementById('short-signal-badge');
        if (data.short_signal_ready) {
            shortBadge.className   = 'signal-badge signal-ready';
            shortBadge.textContent = 'SIGNAL READY';
        } else {
            shortBadge.className   = 'signal-badge signal-pending';
            shortBadge.textContent = 'NOT READY';
        }

        // Long conditions list
        const longList = document.getElementById('long-conditions-list');
        longList.innerHTML = (data.long_conditions || data.conditions || []).map(condRow).join('');

        // Short conditions list — insert a divider before the enhanced conditions
        const shortConds = data.short_conditions || data.conditions || [];
        const baseIds    = new Set(['session','atr','h1_bias','h1_cross','pullback','rsi','candle','positions']);
        const baseConds  = shortConds.filter(c => baseIds.has(c.id));
        const extraConds = shortConds.filter(c => !baseIds.has(c.id));
        const shortList  = document.getElementById('short-conditions-list');
        shortList.innerHTML =
            baseConds.map(condRow).join('') +
            (extraConds.length
                ? `<div class="section-divider">Enhanced Short Filters</div>` + extraConds.map(condRow).join('')
                : '');
    }

    // ── Status fetch ─────────────────────────────────────────
    function formatUptime(s) {
        if (s < 60) return s + 's';
        const m = Math.floor(s / 60);
        if (m < 60) return m + 'm ' + (s % 60) + 's';
        return Math.floor(m / 60) + 'h ' + (m % 60) + 'm';
    }

    async function fetchStatus() {
        try {
            const res  = await fetch('/status');
            const data = await res.json();

            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').style.display = 'none', 500);

            const badge = document.getElementById('status-badge');
            if (data.bot.running) {
                badge.className = 'status-badge bot-running';
                document.getElementById('status-text').textContent = 'Engine Active';
            } else {
                badge.className = 'status-badge bot-stopped';
                document.getElementById('status-text').textContent = 'Engine Offline';
            }

            document.getElementById('bot-mode').textContent = data.bot.mode.toUpperCase();
            document.getElementById('bot-mode').className = data.bot.mode === 'live' ? 'card-value value-gold' : 'card-value value-cyan';
            syncToggle(data.bot.mode);

            document.getElementById('bot-balance').textContent = '$' + data.bot.balance.toLocaleString('en-US', { minimumFractionDigits: 2 });
            document.getElementById('bot-symbol').textContent  = data.bot.symbol;
            document.getElementById('bot-positions').textContent = data.bot.positions;
            document.getElementById('bot-uptime').textContent  = formatUptime(data.uptime_seconds);
            document.getElementById('raw-json').textContent    = JSON.stringify(data, null, 2);

        } catch (e) {
            document.getElementById('status-badge').className = 'status-badge bot-stopped';
            document.getElementById('status-text').textContent = 'Connection Lost';
        }
    }

    // ── Mode toggle ──────────────────────────────────────────
    async function setMode(mode) {
        const confirmed = mode === 'live'
            ? confirm('Switch to LIVE trading? Real orders will be placed.')
            : confirm('Switch to PAPER trading?');
        if (!confirmed) return;
        try {
            const res  = await fetch('/mode', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({mode}) });
            const data = await res.json();
            if (!res.ok) alert('Error: ' + (data.error || res.statusText));
        } catch (e) { alert('Request failed: ' + e.message); }
    }

    function syncToggle(mode) {
        document.getElementById('btn-paper').classList.toggle('active', mode === 'paper');
        document.getElementById('btn-live').classList.toggle('active',  mode === 'live');
    }

    // ── Poll ─────────────────────────────────────────────────
    fetchStatus();
    fetchCandles();
    fetchConditions();
    setInterval(fetchStatus,     2000);
    setInterval(fetchCandles,   10000);
    setInterval(fetchConditions,10000);
    </script>
</body>
</html>
